locale: "en"

backend:
  name: github
  repo: HXStevo/greenparking-zaventem
  branch: main
  base_url: https://test.greenparkingzaventem.be
  auth_endpoint: api/auth

media_folder: "images"
public_folder: "images"

collections:
  - name: "globals"
    label: "Global Settings"
    editor:
      preview: false
    files:
      - name: "globals"
        label: "Site Settings"
        file: "content/_globals.yml"
        fields:
          - { name: "site_name", label: "Site Name", widget: "string" }
          - { name: "logo", label: "Logo", widget: "image" }
          - { name: "phone", label: "Phone Number", widget: "string" }
          - { name: "phone_link", label: "Phone Number (link)", widget: "string" }
          - { name: "email", label: "Email Address", widget: "string" }
          - name: "usp_bar"
            label: "USP Bar (top)"
            widget: "list"
            field: { name: "item", label: "USP", widget: "string" }
          - name: "bottom_usp"
            label: "USP Bar (bottom)"
            widget: "list"
            field: { name: "item", label: "USP", widget: "string" }
          - name: "secondary_nav"
            label: "Secondary Navigation"
            widget: "list"
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "url", label: "URL", widget: "string" }
          - name: "main_nav"
            label: "Main Navigation"
            widget: "list"
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "url", label: "URL", widget: "string" }
          - name: "footer_links"
            label: "Footer Links"
            widget: "list"
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "url", label: "URL", widget: "string" }
          - name: "agents"
            label: "Agent Codes"
            widget: "object"
            fields:
              - { name: "default", label: "Direct Traffic Agent Code", widget: "string", hint: "Agent code for visitors arriving directly (no referrer)" }
              - { name: "search", label: "SEO Traffic Agent Code", widget: "string", hint: "Agent code for visitors arriving from search engines (Google, Bing, etc.)" }

  - name: "pages"
    label: "Pages"
    editor:
      preview: false
    files:
      - name: "homepage"
        label: "Homepage"
        file: "content/index.yml"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "meta_description", label: "Meta Description", widget: "text" }
          - { name: "og_title", label: "OG Title", widget: "string", required: false }
          - { name: "og_description", label: "OG Description", widget: "string", required: false }
          - name: "hero"
            label: "Hero Section"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "text", label: "Text", widget: "text" }
              - { name: "image", label: "Background Image", widget: "image" }
          - name: "booking"
            label: "Booking Form"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
          - name: "how_it_works"
            label: "How It Works"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "heading_emphasis", label: "Heading (emphasis)", widget: "string" }
              - name: "cards"
                label: "Cards"
                widget: "list"
                fields:
                  - { name: "image", label: "Image", widget: "image" }
                  - { name: "alt", label: "Alt Text", widget: "string" }
                  - { name: "text", label: "Text", widget: "string" }
          - name: "benefits"
            label: "Benefits"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "image", label: "Image", widget: "image" }
              - name: "items"
                label: "Benefits List"
                widget: "list"
                field: { name: "item", label: "Benefit", widget: "string" }
          - name: "shuttle"
            label: "Shuttle Service"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "image", label: "Image", widget: "image" }
              - name: "paragraphs"
                label: "Paragraphs"
                widget: "list"
                field: { name: "paragraph", label: "Paragraph", widget: "text" }
          - name: "pricing"
            label: "Pricing Section"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading (HTML allowed)", widget: "string" }
              - { name: "text", label: "Text (HTML allowed)", widget: "text" }
          - name: "cta"
            label: "Call to Action"
            widget: "object"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - name: "paragraphs"
