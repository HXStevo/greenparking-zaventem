<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenParking Zaventem - Content Manager</title>
</head>
<body>
    <script>
    // OAuth relay for Decap CMS on Vercel
    // After GitHub OAuth, window.opener is lost due to cross-origin redirects.
    // The callback page stores the token in localStorage/BroadcastChannel.
    // This script picks it up and writes it directly into Decap CMS's internal
    // auth state (netlify-cms-user), then reloads so CMS starts authenticated.
    (function() {
        var handled = false;

        function handleAuth(authMessage) {
            if (handled) return;
            if (typeof authMessage !== 'string') return;
            if (authMessage.indexOf('authorization:github:success:') !== 0) return;
            handled = true;

            try {
                // Extract JSON payload from "authorization:github:success:{...}"
                var jsonStr = authMessage.substring('authorization:github:success:'.length);
                var data = JSON.parse(jsonStr);

                if (data.token) {
                    // Write directly into Decap CMS's internal auth storage
                    localStorage.setItem('netlify-cms-user', JSON.stringify({
                        token: data.token,
                        backendName: 'github'
                    }));
                    // Clean up relay storage
                    localStorage.removeItem('decap-cms-auth');
                    // Reload so CMS picks up the stored auth
                    window.location.reload();
                }
            } catch(e) {}
        }

        // Method 1: BroadcastChannel
        if (typeof BroadcastChannel !== 'undefined') {
            var channel = new BroadcastChannel('decap-cms-auth');
            channel.onmessage = function(e) { handleAuth(e.data); };
        }

        // Method 2: localStorage change event
        window.addEventListener('storage', function(e) {
            if (e.key === 'decap-cms-auth' && e.newValue) {
                handleAuth(e.newValue);
            }
        });

        // Method 3: Poll localStorage as backup
        var pollInterval = setInterval(function() {
            try {
                var data = localStorage.getItem('decap-cms-auth');
                if (data && data.indexOf('authorization:') === 0) {
                    clearInterval(pollInterval);
                    handleAuth(data);
                }
            } catch(e) {}
        }, 500);
        setTimeout(function() { clearInterval(pollInterval); }, 120000);
    })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
