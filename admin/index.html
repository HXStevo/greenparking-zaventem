<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenParking Zaventem - Content Manager</title>
</head>
<body>
    <script>
    // OAuth reload listener for Decap CMS on Vercel.
    // The callback popup stores the token directly in netlify-cms-user
    // and signals this page to reload via BroadcastChannel or localStorage.
    (function() {
        var reloading = false;
        function doReload() {
            if (reloading) return;
            reloading = true;
            localStorage.removeItem('decap-cms-auth');
            window.location.reload();
        }

        // Listen for reload signal via BroadcastChannel
        if (typeof BroadcastChannel !== 'undefined') {
            var channel = new BroadcastChannel('decap-cms-auth');
            channel.onmessage = function() { doReload(); };
        }

        // Listen for reload signal via localStorage storage event
        window.addEventListener('storage', function(e) {
            if (e.key === 'decap-cms-auth' && e.newValue) { doReload(); }
        });

        // Poll localStorage as backup
        var poll = setInterval(function() {
            try {
                if (localStorage.getItem('decap-cms-auth')) {
                    clearInterval(poll);
                    doReload();
                }
            } catch(e) {}
        }, 500);
        setTimeout(function() { clearInterval(poll); }, 120000);
    })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
