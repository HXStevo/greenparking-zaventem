features:
  heading: "Hoe werkt kort parkeren bij <em>GreenParking Zaventem</em>?"
  image: "images/security-camera.jpg"
  image_alt: "Beveiligd parkeerterrein GreenParking"
  paragraphs:
    - "Na je online reservering ontvang je een voucher met een persoonlijke barcode. Bij aankomst op het parkeerterrein scan je deze barcode waardoor de slagbomen automatisch open gaan. Je kunt de voucher ook op je mobiel opslaan en scannen."
    - "Parkeer je auto op een van de ruime plekken en neem de gratis shuttlebus richting de luchthaven. De rit duurt ongeveer 15 minuten. Op de terugweg neem je de shuttle terug naar de parking en rij je zo naar huis."

locations:
  heading: "Onze locaties nabij <em>Zaventem Airport</em>"
  image: "images/parking-lot-full.jpg"
  image_alt: "Parkeerterrein GreenParking Zaventem"
  paragraphs:
    - "GreenParking Zaventem heeft twee parkeerterreinen: aan de Budasteenweg en aan de Vilvoordelaan. Beide locaties zijn 24/7 geopend en beveiligd met camera's. De gratis shuttlebus brengt je snel naar de terminal."
    - "Na je boeking ontvang je een voucher met het exacte adres en routebeschrijving per e-mail. Stel je navigatie in en volg de borden naar GreenParking."
