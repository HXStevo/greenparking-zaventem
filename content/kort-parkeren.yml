title: "Voordelig Kort Parkeren Zaventem | GreenParking Zaventem"
meta_description: "Onze parkings worden 24/7 bewaakt en zijn alleen toegankelijk met een geldige vouchercode. Reserveer binnen 1 minuut via GreenParking Zaventem."

hero:
  heading: "Kort parkeren <em>Zaventem</em>"
  paragraphs:
    - "Moet je slechts een paar dagen parkeren bij Brussel Zaventem Airport? Bij GreenParking Zaventem kun je ook voor korte periodes voordelig en veilig parkeren. Onze parkings worden 24/7 bewaakt en zijn alleen toegankelijk met een geldige vouchercode."
    - "Reserveer binnen 1 minuut online en ontvang direct je voucher met barcode. Bij aankomst scan je de barcode, parkeer je auto en neem de gratis shuttlebus naar de terminal. Zo simpel is het!"
  image: "images/illustration.png"
  image_alt: "Kort parkeren bij Zaventem"

booking:
  heading: "Bereken je tarief voor kort parkeren"

benefits:
  heading: "Voordelen van kort parkeren bij <em>GreenParking</em>"
  image: "images/traveler.jpg"
  items:
