  text: "Vous cherchez un bon parking pour garer votre voiture à prix avantageux, situé à seulement 15 minutes de l'aéroport ? Alors vous êtes à la bonne adresse chez GreenParking. Notre parking se trouve à proximité de l'aéroport de Bruxelles Zaventem, vous serez donc rapidement à l'aéroport grâce à notre navette gratuite ! Un autre avantage est que nous sommes souvent 20% moins chers que les prestataires de stationnement autour de l'aéroport de Bruxelles Zaventem. 240.000 voyageurs nous ont déjà fait confiance. Assurez-vous de partir en vacances ou en voyage d'affaires l'esprit tranquille et choisissez la fiabilité et le bon service de GreenParking !"
