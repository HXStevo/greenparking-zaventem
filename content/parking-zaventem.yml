benefits:
  heading: Voordelen van parkeren bij <em>GreenParking</em>
  image: images/traveler.jpg
  items:
    - Voordelige tarieven
    - Gratis shuttlebus service
    - Goed verlichte parkeerterreinen
    - 24/7 camerabewaking
    - Klantenservice 24/7 bereikbaar
location:
  heading: "Locatie: <em>Vilvoordelaan</em>"
  image: images/parking-lot-full.jpg
  paragraphs:
    - Onze parkeerterreinen zijn gelegen aan de Vilvoordelaan, op ongeveer 15
      minuten van de vertrekhal. Stel je navigatie in op Vilvoordelaan en volg
      de borden naar GreenParking.
    - Na je boeking ontvang je een voucher met het exacte adres en
      routebeschrijving per e-mail.
