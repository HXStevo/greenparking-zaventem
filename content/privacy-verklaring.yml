title: "Privacy Verklaring | GreenParking Zaventem"
meta_description: "Privacy verklaring van GreenParking Zaventem. Lees hoe wij omgaan met uw persoonsgegevens."

heading: "Privacy Verklaring"

intro: "QP Quick Parking B.V., gevestigd aan Tupolevlaan 41, 1119 NW Schiphol-Rijk, Nederland, is verantwoordelijk voor de verwerking van persoonsgegevens zoals weergegeven in deze privacyverklaring."

sections:
  - heading: "Persoonsgegevens die wij verwerken"
    content: |
      <p>QP Quick Parking B.V. verwerkt je persoonsgegevens doordat je gebruik maakt van onze diensten en/of omdat je deze gegevens zelf aan ons verstrekt. Hieronder vind je een overzicht van de persoonsgegevens die wij verwerken:</p>
      <ul>
        <li>Voor- en achternaam</li>
        <li>Telefoonnummer</li>
        <li>E-mailadres</li>
        <li>IP adres</li>
      </ul>

  - heading: "Bijzondere en/of gevoelige persoonsgegevens die wij verwerken"
    content: |
      <p>Onze website en/of dienst heeft niet de intentie gegevens te verzamelen over websitebezoekers die jonger zijn dan 16 jaar. Tenzij ze toestemming hebben van ouders of voogd. We kunnen echter niet controleren of een bezoeker ouder dan 16 is. Wij raden ouders dan ook aan betrokken te zijn bij de online activiteiten van hun kinderen, om zo te voorkomen dat er gegevens over kinderen verzameld worden zonder ouderlijke toestemming. Als je er van overtuigd bent dat wij zonder die toestemming persoonlijke gegevens hebben verzameld over een minderjarige, neem dan contact met ons op via info@greenparking.nl, dan verwijderen wij deze informatie.</p>

  - heading: "Met welk doel en op basis van welke grondslag wij persoonsgegevens verwerken"
    content: |
      <p>QP Quick Parking B.V. verwerkt jouw persoonsgegevens voor de volgende doelen:</p>
      <ul>
        <li>Je te kunnen bellen of e-mailen indien dit nodig is om onze dienstverlening uit te kunnen voeren</li>
        <li>Je te informeren over wijzigingen van onze diensten en producten</li>
        <li>Om onze diensten te leveren</li>
      </ul>
      <p>De wettelijke grondslagen voor de verwerking van je gegevens zijn het gerechtvaardigd belang de gegevens te verwerken teneinde in contact met je te kunnen komen en uiteraard is het noodzakelijk de gegevens te verwerken voor de uitvoering van onze overeenkomst met jou betreffende onze diensten.</p>

  - heading: "Hoe lang we persoonsgegevens bewaren"
    content: |
      <p>QP Quick Parking B.V. bewaart je persoonsgegevens niet langer dan strikt nodig is om de doelen te realiseren waarvoor je gegevens worden verzameld. De bewaartermijn is onder andere afhankelijk van de termijn waarop je onze diensten afneemt. Als je hierover meer vragen hebt, kun je contact met ons opnemen.</p>

  - heading: "Delen van persoonsgegevens met derden"
    content: |
      <p>QP Quick Parking B.V. deelt jouw persoonsgegevens met verschillende derden als dit noodzakelijk is voor het uitvoeren van de overeenkomst en om te voldoen aan een eventuele wettelijke verplichting. Met bedrijven die je gegevens verwerken in onze opdracht, sluiten wij een verwerkersovereenkomst om te zorgen voor eenzelfde niveau van beveiliging en vertrouwelijkheid van jouw gegevens. QP Quick Parking B.V. blijft verantwoordelijk voor deze verwerkingen.</p>

  - heading: "Cookies, of vergelijkbare technieken, die wij gebruiken"
    content: |
      <p>QP Quick Parking B.V. gebruikt functionele, analytische en tracking cookies. Een cookie is een klein tekstbestand dat bij het eerste bezoek aan deze website wordt opgeslagen in de browser van je computer, tablet of smartphone.</p>
      <p>QP Quick Parking B.V. gebruikt cookies met een puur technische functionaliteit. Deze zorgen ervoor dat de website naar behoren werkt en dat bijvoorbeeld jouw voorkeursinstellingen onthouden worden. Daarnaast plaatsen we cookies die jouw surfgedrag bijhouden zodat we op maat gemaakte content en advertenties kunnen aanbieden.</p>
      <p>Je kunt je afmelden voor cookies door je internetbrowser zo in te stellen dat deze geen cookies meer opslaat. Daarnaast kun je ook alle informatie die eerder is opgeslagen via de instellingen van je browser verwijderen.</p>

  - heading: "Gegevens inzien, aanpassen of verwijderen"
    content: |
      <p>Je hebt het recht om je persoonsgegevens in te zien, te corrigeren of te verwijderen. Daarnaast heb je het recht om je eventuele toestemming voor de gegevensverwerking in te trekken of bezwaar te maken tegen de verwerking van jouw persoonsgegevens door QP Quick Parking B.V. en heb je het recht op gegevensoverdraagbaarheid.</p>
      <p>Je kunt een verzoek tot inzage, correctie, verwijdering, gegevensoverdraging van je persoonsgegevens of verzoek tot intrekking van je toestemming sturen naar info@greenparking.nl.</p>
      <p>Om er zeker van te zijn dat het verzoek tot inzage door jou is gedaan, vragen wij jou een kopie van je identiteitsbewijs met het verzoek mee te sturen. Maak in deze kopie je pasfoto, MRZ, paspoortnummer en Burgerservicenummer (BSN) zwart. Dit ter bescherming van je privacy. We reageren zo snel mogelijk, maar binnen vier weken, op jouw verzoek.</p>
      <p>QP Quick Parking B.V. wil je er tevens op wijzen dat je de mogelijkheid hebt om een klacht in te dienen bij de nationale toezichthouder, de Autoriteit Persoonsgegevens.</p>

  - heading: "Hoe wij persoonsgegevens beveiligen"
    content: |
      <p>QP Quick Parking B.V. neemt de bescherming van jouw gegevens serieus en neemt passende maatregelen om misbruik, verlies, onbevoegde toegang, ongewenste openbaarmaking en ongeoorloofde wijziging tegen te gaan. Als jij het idee hebt dat jouw gegevens toch niet goed beveiligd zijn of er aanwijzingen zijn van misbruik, neem dan contact op met onze klantenservice of via info@greenparking.nl.</p>
