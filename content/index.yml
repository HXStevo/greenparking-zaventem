shuttle:
  heading: "24/7 Shuttle Service"
  image: "images/parking-lot-full.jpg"
  paragraphs:
    - "Om de parking van GreenParking Brussel Zaventem Airport op te komen, kun je jouw barcode scannen zodat de slagbomen open gaan. Deze barcode vind je op de voucher die je ontvangt na je boeking. Je kunt de voucher ook op je mobiel opslaan en dan scannen. Als je je auto op een goeie plek hebt gezet, kun je de gratis shuttlebus naar de luchthaven nemen. De rit met de shuttlebus duurt ongeveer 15 minuten. Je bent dus zo bij de vertrekterminal van de luchthaven. Ready for take off!"
    - "Ook op de terugreis is het eenvoudig om de shuttlebus richting de parking te nemen. Zo ben je snel weer bij je eigen auto."
    - "Mocht je vragen hebben, neem dan gerust contact op met onze klantenservice, ze staan 24/7 voor je klaar."

pricing:
  heading: "Wat kost parkeren bij<br>Brussel Zaventem parking?"
  text: "Wil je graag weten hoeveel je betaalt voor jouw parking? Bekijk dan de voordelige tarieven door te zoeken op de gewenste reisdata. De hoogte van het tarief is onder meer afhankelijk van het seizoen waarvoor je boekt. Het is raadzaam om een parking in het hoogseizoen zo ver mogelijk van tevoren te boeken. Zo pak je het voordeligste tarief en ben je zeker van een fijne plek voor je auto. Op naar die vakantie of zakenreis! Om teleurstellingen te voorkomen raden we aan om alvast een kijkje te nemen. Bereken het <a href=\"reserveren.html\" style=\"color: var(--color-orange);\">actuele tarief</a>."

cta:
  heading: "Voordelige parking bij Brussel Zaventem? Reserveer bij GreenParking Zaventem!"
  paragraphs:
    - "Denk je dat parkeren nabij Brussel Zaventem Airport duur is? Dan zal dat je zeker meevallen als je de voordelige tarieven van GreenParking bekijkt. Een kwalitatief goede parkeerplek hoeft echt niet duur te zijn! Reserveer snel een parkeerplaats op onze parking nabij Brussel Zaventem Airport. Zo weet je zeker dat je auto er goed bijstaat tijdens jouw afwezigheid."
    - "Wil je meer weten over parkeren bij Brussel Zaventem Airport? Dan kun je altijd de <a href=\"faq.html\" style=\"color: var(--color-orange);\">veelgestelde vragen</a> bekijken of <a href=\"contact.html\" style=\"color: var(--color-orange);\">contact opnemen</a> met onze klantenservice. Ze staan je graag te woord en helpen je graag verder bij het vinden van een geschikte parkeerplek nabij Brussel Zaventem Airport."
