hero:
  heading: "Voordelige parking Brussel Zaventem"
  text: "Zoek je een goede parking om je auto voordelig te parkeren die slechts op 15 minuten van de luchthaven zelf ligt? Dan ben je bij GreenParking aan het juiste adres. Onze parking vind je vlakbij Brussel Zaventem Airport dus je bent zo op de luchthaven met onze gratis shuttlebus! Een ander voordeel is dat we vaak 20% goedkoper zijn dan parkeeraanbieders rondom Brussel Zaventem Airport. 240.000 reizigers gingen je voor. Zorg dat je onbezorgd op vakantie of zakenreis kunt en kies voor de betrouwbaarheid en goede service van GreenParking!"
  image: "images/parking-lot.jpg"

