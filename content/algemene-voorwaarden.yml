title: "Algemene Voorwaarden | GreenParking Zaventem"
meta_description: "Algemene voorwaarden van GreenParking Zaventem. Lees onze voorwaarden voor het parkeren bij Brussels Airport."

heading: "Algemene Voorwaarden"

intro: "GreenParking is een merknaam van QP Quick Parking B.V.<br>Tupolevlaan 41, 1119 NW Schiphol-Rijk, Nederland<br>Telefoonnummer: +31 (0)20 237 66 22<br>Emailadres: info@greenparking.com<br>KvK-nummer 77802675"

sections:
  - heading: "1. Definities"
    content: |
      <p>1.1 <strong>Parkeer Management Systeem (PMS)</strong>: een systeem bestaande uit hard- en software dat wordt gebruikt voor toegangscontrole, betalingshandelingen, uitrijdcontrole en leveren van managementinformatie met betrekking tot de Parkeerfaciliteit;</p>
      <p>1.2 <strong>Parkeerbewijs</strong>: parkeerkaart of ieder ander door Quick Parking aangewezen middel waarmee toegang tot de Parkeerfaciliteit kan worden verkregen en waarmee het tijdstip van binnenkomst in of op de Parkeerfaciliteit kan worden vastgesteld;</p>
      <p>1.3 <strong>Parkeerder</strong>: eigenaar, kentekenhouder, de Parkeerder, houder of inzittende van een motorvoertuig dat in of op de Parkeerfaciliteit is gebracht;</p>
      <p>1.4 <strong>Parkeerfaciliteit</strong>: de parkeergarage en/of het parkeerterrein met bijbehorende terreinen en ruimten;</p>
      <p>1.5 <strong>Parkeergeld</strong>: het bedrag dat de Parkeerder is verschuldigd voor het gebruik van de Parkeerfaciliteit;</p>
      <p>1.6 <strong>Parkeerovereenkomst</strong>: de eenmalige parkeerovereenkomst als bedoeld in artikel 2.2;</p>
      <p>1.7 <strong>Parkeerperiode</strong>: de op de reservering vermelde periode waarin het voertuig op de Parkeerfaciliteit kan worden geparkeerd.</p>
      <p>1.8 GreenParking is een merknaam en onderdeel van QP Quick Parking B.V. In dit document zal worden gesproken over Quick Parking. Daaronder valt GreenParking, dan wel een aan haar gelieerde partij;</p>

  - heading: "2. Toepasselijkheid algemene voorwaarden"
    content: |
      <p>2.1. De toegang tot de Parkeerfaciliteit wordt uitsluitend verleend onder toepassing van deze voorwaarden en de algemene voorwaarden van de Nederlandse Thuiswinkel Organisatie, die deel uitmaken van iedere met Quick Parking gesloten Parkeerovereenkomst en op iedere reservering van toepassing zijn.</p>
      <p>2.2. Een Parkeerovereenkomst wordt geacht tot stand te zijn gekomen door:</p>
      <ul>
        <li>het houderschap van een Parkeerbewijs;</li>
        <li>via een reservering als bedoeld in artikel 3;</li>
        <li>door het enkele feit van het gebruik van de Parkeerfaciliteit.</li>
      </ul>

  - heading: "3. Gereserveerd parkeren"
    content: |
      <p>3.1. Reserveren van een parkeerplaats geschiedt uitsluitend via Quick Parking of via een door een derde aangeboden boekingsformulier en tegen het bij het plaatsen van de reservering vermelde tarief.</p>
      <p>3.2. Reserveringen dienen 20 minuten voor aanvang van de Parkeerperiode te worden gedaan en gelden onder voorbehoud van beschikbaarheid.</p>
      <p>3.3. De Parkeerder dient in het boekingsformulier opgave te doen van de ingangsdatum en de einddatum van de Parkeerperiode.</p>
      <p>3.4. Een online reservering kan bij Quick Parking later online betaald worden. De Parkeerder ontvangt 48 uur van tevoren een betaallink per mail.</p>
      <p>3.5. Quick Parking zendt per email een reserveringsbevestiging aan het door de Parkeerder opgegeven emailadres.</p>
      <p>3.6. Quick Parking kan aan Parkeerders promotiecodes verstrekken. Het gebruik van promotiecodes is strikt persoonlijk.</p>
      <p>3.7. Het is mogelijk om op een eerdere of latere datum/tijd dan de aanvang van de Parkeerperiode de Parkeerfaciliteit in/op te rijden.</p>
      <p>3.8. Quick Parking verwerkt de door de Parkeerder op het boekingsformulier op de website ingevulde persoonsgegevens.</p>
      <p>3.9. De gegevens van de Parkeerder worden opgeslagen in een klantenbestand en gebruikt voor het afwikkelen van de reservering.</p>
      <p>3.10. Indien de Parkeerder bezwaren heeft tegen het verzamelen en analyseren van gegevens, kan de Parkeerder dit laten weten via info@greenparking.com.</p>
      <p>3.11. Quick Parking heeft de afhandeling van creditcardtransacties uitbesteed aan Adyen.</p>

  - heading: "4. Parkeerfaciliteit en toegang"
    content: |
      <p>4.1. Een Parkeerder, voertuig of persoon is slechts bevoegd de Parkeerfaciliteit te betreden met een geldig Parkeerbewijs.</p>
      <p>4.2. Aan de Parkeerder wordt een willekeurige plaats in de Parkeerfaciliteit ter beschikking gesteld.</p>
      <p>4.3. Op sommige Parkeerfaciliteiten wordt de mogelijkheid tot het elektrisch opladen van voertuigen geboden.</p>
      <p>4.4. Het in- en uitrijden van voertuigen kan uitsluitend geschieden tijdens de aangegeven openingstijden.</p>
      <p>4.5. Tot de Parkeerfaciliteit worden uitsluitend toegelaten personenauto's en bedrijfsauto's met een maximale lengte van 5 m., een breedte van maximaal 1,90 m., een maximaal gewicht van 2.500 kg.</p>
      <p>4.6. Het is niet toegestaan met aanhangwagens van welke aard dan ook de Parkeerfaciliteit in- of op te rijden.</p>
      <p>4.7. Indien bij een Parkeerfaciliteit de sleutel van het voertuig wordt ingenomen, is Quick Parking te allen tijde gerechtigd het voertuig te verplaatsen.</p>
      <p>4.8. Quick Parking is gerechtigd aan enig voertuig de toegang tot de Parkeerfaciliteit te weigeren.</p>
      <p>4.9. Quick Parking is gerechtigd voertuigen binnen de Parkeerfaciliteit te verplaatsen en/of enig voertuig uit de Parkeerfaciliteit te verwijderen.</p>
      <p>4.10. Voertuigen die in strijd met de toepasselijke voorschriften zijn geparkeerd, kunnen door Quick Parking te allen tijde worden verwijderd.</p>

  - heading: "5. Gebruiksvoorschriften"
    content: |
      <p>5.1. De Parkeerder betreedt en maakt geheel voor eigen risico gebruik van de Parkeerfaciliteit.</p>
      <p>5.2. De Parkeerder is verplicht de aanwijzingen van Quick Parking op te volgen.</p>
      <p>5.3. In of op de Parkeerfaciliteit geldt een maximumsnelheid van 5 kilometer per uur (stapvoets).</p>
      <p>5.4. Gedurende de aanwezigheid op het terrein dient de Parkeerder zich te gedragen conform de Wegenverkeerswet.</p>
      <p>5.5. De Parkeerder dient het voertuig te parkeren op de aangegeven plaatsen.</p>
      <p>5.6. Het is verboden om de Parkeerfaciliteit te gebruiken voor andere doeleinden dan parkeren, te roken of vuur te maken, reparaties uit te voeren, of afval achter te laten.</p>
      <p>5.7. Zonder voorafgaande schriftelijke toestemming mag een voertuig niet langer dan 90 dagen ononderbroken geparkeerd zijn.</p>
      <p>5.8. Indien de Parkeerder een voertuig heeft achtergelaten, is Quick Parking gerechtigd het voertuig te verwijderen.</p>

  - heading: "6. Parkeergeld en betaling"
    content: |
      <p>6.1. Voor het gebruik van de Parkeerfaciliteit is de Parkeerder Parkeergeld verschuldigd.</p>
      <p>6.2. De tarieven staan vermeld op de website van Quick Parking. Quick Parking behoudt zich het recht voor de tarieven te wijzigen.</p>
      <p>6.3. Het Parkeergeld moet vooraf betaald worden. De Parkeerder ontvangt een betaallink per mail (48 uur van tevoren).</p>
      <p>6.4. Het is verboden de Parkeerfaciliteit met een voertuig te verlaten zonder dat voor het gebruik is betaald.</p>
      <p>6.5. Het staat Quick Parking vrij de Parkeerder en/of het betreffende voertuig (tijdelijk) de toegang tot de Parkeerfaciliteit te ontzeggen.</p>

  - heading: "7. Aansprakelijkheid"
    content: |
      <p>7.1. De Parkeerovereenkomst omvat adequate bewaking, niet zijnde individuele permanente bewaking van het voertuig. Quick Parking is niet aansprakelijk voor beschadiging, diefstal, verlies van het voertuig.</p>
      <p>7.2. Quick Parking is niet aansprakelijk voor tekortkomingen, tenzij de Parkeerder kan aantonen dat sprake is van opzet of grove schuld.</p>
      <p>7.3. Quick Parking is niet gehouden schade te vergoeden indien sprake is van overmacht.</p>
      <p>7.4. De Parkeerder is aansprakelijk voor alle schade die door hem/haar is veroorzaakt.</p>
      <p>7.5. Indien de Parkeerder tekortschiet in de nakoming van enige verplichting, is de Parkeerder gehouden alle geleden schade te vergoeden.</p>
      <p>7.6. Quick Parking is te allen tijde gerechtigd het voertuig onder zich te houden zolang niet al hetgeen Quick Parking te vorderen heeft, is voldaan.</p>

  - heading: "8. Privacy"
    content: |
      <p>8.1. In de Parkeerfaciliteit kan ter bestrijding van diefstal en vernieling videoregistratie plaatsvinden.</p>
      <p>8.2. Bij het in-/oprijden van de Parkeerfaciliteit kan door Quick Parking gebruik worden gemaakt van kentekenherkenning.</p>

  - heading: "9. Overig"
    content: |
      <p>9.1. Afspraken met personeelsleden van Quick Parking binden deze laatste niet, voor zover deze niet schriftelijk zijn bevestigd.</p>
      <p>9.2. Voor zover enig beding nietig of vernietigbaar is, dient dit beding te worden geconverteerd in een zodanig beding dat zoveel mogelijk recht doet aan de strekking.</p>
      <p>9.3. Quick Parking is gerechtigd deze voorwaarden te allen tijde te wijzigen.</p>

  - heading: "10. Toepasselijk recht en geschillenregeling"
    content: |
      <p>10.1. Op deze overeenkomst is Nederlands recht van toepassing.</p>
      <p>10.2. De Parkeerder dient Quick Parking in ieder geval 4 weken de tijd te geven om de klacht in onderling overleg op te lossen.</p>

  - heading: "11. Boeking wijzigen"
    content: |
      <p>11.1. Het wijzigen van de persoonlijke gegevens of de aankomst- en/of vertrektijd van een boeking is toegestaan en kosteloos voor alle producten, mits het geen datumwijziging inhoudt.</p>
      <p>11.2. Het wijzigen van de aankomst- en/of vertrekdata is niet mogelijk voor het basic product.</p>

  - heading: "12. Aankomst en vertrek van de parking"
    content: |
      <p>12.1. Op de geplande aankomstdatum kan een klant op elk moment inrijden.</p>
      <p>12.2. Vertrek is kosteloos toegestaan tot 03:00 AM na de geboekte vertrektijd.</p>
      <p>12.3. Indien een klant na 03:00 AM vertrekt, worden de totale kosten opnieuw berekend op basis van de dan geldende tarieven.</p>

  - heading: "13. Annuleren van de boeking"
    content: |
      <p>13.1. Het annuleren van een basic product is niet toegestaan in overeenstemming met de wet koop op afstand.</p>
