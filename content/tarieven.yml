hero:
  heading: "Tarieven<br><em>Zaventem</em> parkeren"
  text: "Als je graag voordelige tarieven wil, dan is het een goed idee om bij GreenParking te reserveren. Je kunt al voor &euro;3,57 per dag parkeren bij ons! De tarieven kunnen verschillen in het hoog- of laagseizoen. Ook speelt het mee hoeveel beschikbaarheid er nog is. Het is wijsheid om zo vroeg mogelijk te boeken, vaak zijn de tarieven dan het voordeligst. De actuele parkeertarieven kun je bekijken op onze website. Vul je vertrek- en aankomstdata in en je ziet gelijk wat je moet betalen. Reserveer direct om later teleurstelling te voorkomen."
  image: "images/illustration.png"
  image_alt: "Illustratie parkeren bij Zaventem"

calculator:
  heading: "<em>Bereken</em> het tarief"
  info_heading: "Wat kost parkeren bij Zaventem?"
  info_paragraphs:
    - "Vul je gewenste vertrek- en aankomstdata in om het actuele tarief te berekenen. Je ziet direct wat je betaalt, zonder verborgen kosten. Na het berekenen kun je direct reserveren en zo de beste prijs pakken."
    - "De tarieven van GreenParking Zaventem zijn tot 20% goedkoper dan parkeren op de luchthaven zelf. Bovendien biedt onze service een gratis 24/7 shuttlebus van en naar de terminal."

